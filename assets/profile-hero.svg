<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-label="Kieran Jackson">
  <defs>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#16130f" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <radialGradient id="gridFade" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#f3f1ec" stop-opacity="0"/>
      <stop offset="70%" stop-color="#f3f1ec" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f3f1ec" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="440" fill="#f3f1ec"/>
  <rect width="1200" height="440" fill="url(#grid)"/>
  <rect width="1200" height="440" fill="url(#gridFade)"/>

  <g transform="translate(80, 54)">
    <rect width="168" height="28" rx="14" fill="#1e3a5f" fill-opacity="0.08" stroke="#1e3a5f" stroke-opacity="0.35"/>
    <text x="84" y="19" text-anchor="middle" fill="#1e3a5f" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2.4">SYDNEY · YEAR ONE</text>
  </g>

  <text x="80" y="268" fill="#16130f" font-family="'Instrument Serif','Georgia',serif" font-size="168" letter-spacing="-5">Kieran Jackson<tspan fill="#1e3a5f">.</tspan></text>

  <text x="82" y="316" fill="#3a342c" fill-opacity="0.75" font-family="'Instrument Serif','Georgia',serif" font-style="italic" font-size="19">Building apparel, hardware, and software — quietly and in public at the same time.</text>

  <g transform="translate(80, 354)" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1.8">
    <g>
      <rect width="134" height="28" rx="14" fill="#ffffff" stroke="#16130f" stroke-opacity="0.16"/>
      <circle cx="16" cy="14" r="4" fill="#1e3a5f"/>
      <text x="30" y="18" fill="#16130f" fill-opacity="0.8">HEALTH AGENT</text>
    </g>
    <g transform="translate(142, 0)">
      <rect width="102" height="28" rx="14" fill="#ffffff" stroke="#16130f" stroke-opacity="0.16"/>
      <circle cx="16" cy="14" r="4" fill="#1e3a5f"/>
      <text x="30" y="18" fill="#16130f" fill-opacity="0.8">ARCTIQ</text>
    </g>
    <g transform="translate(252, 0)">
      <rect width="146" height="28" rx="14" fill="#ffffff" stroke="#16130f" stroke-opacity="0.16"/>
      <circle cx="16" cy="14" r="4" fill="#1e3a5f"/>
      <text x="30" y="18" fill="#16130f" fill-opacity="0.8">404 TRAINING</text>
    </g>
  </g>

  <g transform="translate(1030, 220)">
    <circle r="140" fill="none" stroke="#16130f" stroke-opacity="0.08" stroke-width="1"/>
    <circle r="108" fill="none" stroke="#16130f" stroke-opacity="0.12" stroke-width="1"/>
    <circle r="72" fill="none" stroke="#16130f" stroke-opacity="0.2" stroke-width="1"/>
    <circle r="36" fill="none" stroke="#16130f" stroke-opacity="0.32" stroke-width="1"/>
    <circle cx="0" cy="0" r="6" fill="#1e3a5f"/>
    <g font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.4" fill="#78716c">
      <text x="0" y="-148" text-anchor="middle">NORTH</text>
      <text x="0" y="160" text-anchor="middle">SOFTWARE ⇄ HARDWARE</text>
    </g>
    <text x="-4" y="42" text-anchor="end" fill="#1e3a5f" font-family="'Caveat','Bradley Hand','Segoe Script',cursive" font-size="20" transform="rotate(-8 0 42)">north star</text>
  </g>
</svg>
